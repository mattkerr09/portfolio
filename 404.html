<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Matthew Kerr</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <script>
    (function(){ try { var t = localStorage.getItem('theme') || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'); document.documentElement.setAttribute('data-theme', t); } catch(e){} })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fraunces:ital,opsz,wght@0,9..144,300;1,9..144,300&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#faf9f6; --ink:#14130f; --ink-3:#74726a; --accent:#2447e8; --line:#e7e3da; --surface:#fff; }
    [data-theme="dark"]{ --bg:#0c0c12; --ink:#f1efe9; --ink-3:#908e86; --accent:#6f8bff; --line:#262630; --surface:#16161f; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--ink); font-family:'Inter',system-ui,sans-serif;
           min-height:100vh; display:flex; align-items:center; justify-content:center; text-align:center; padding:2rem; }
    .code { font-family:'JetBrains Mono',monospace; font-size:0.8rem; letter-spacing:0.15em; color:var(--accent); text-transform:uppercase; margin-bottom:1rem; }
    h1 { font-family:'Fraunces',serif; font-weight:300; font-size:clamp(2.2rem,6vw,3.5rem); letter-spacing:-0.02em; margin-bottom:0.75rem; }
    p { color:var(--ink-3); margin-bottom:2rem; max-width:380px; line-height:1.7; }
    a { display:inline-flex; align-items:center; gap:0.4rem; background:var(--ink); color:var(--bg);
        text-decoration:none; font-weight:600; font-size:0.9rem; padding:0.7rem 1.4rem; border-radius:9px; transition:background .15s; }
    a:hover { background:var(--accent); color:#fff; }
  </style>
</head>
<body>
  <div>
    <div class="code">404 — Page not found</div>
    <h1>This page shipped elsewhere.</h1>
    <p>The link you followed doesn't exist (or moved). Let's get you back to the work.</p>
    <a href="/">← Back to matthewkerr.dev</a>
  </div>
</body>
</html>
